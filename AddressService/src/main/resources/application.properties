spring.application.name=address-service
server.port=8084


# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/Address_DB?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=aastha
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Eureka Client Config - FIX THE TYPO HERE
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.eureka-server-connect-timeout-seconds=30

eureka.instance.prefer-ip-address=true